#:schema node_modules/wrangler/config-schema.json

name = "zixo-app"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat_v2"]

[assets]
directory = ".open-next/assets"

# R2 bucket binding for media storage
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "zixocall"

# Environment variables (secrets like FIREBASE_DATABASE_SECRET should be set via Cloudflare dashboard)
[vars]
FIREBASE_PROJECT_ID = "zixo-call"

[placement]
mode = "smart"
